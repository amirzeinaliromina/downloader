name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیوی یوتوب را وارد کنید'
        required: true
        type: string
      quality:
        description: 'کیفیت ویدیو را انتخاب کنید'
        required: true
        type: choice
        options:
          - 'Best (بالاترین کیفیت ممکن)'
          - '1080p'
          - '720p'
          - '480p'
          - 'Audio Only (فقط صدا - MP3)'

jobs:
  download-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies (FFmpeg & yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Create Downloads Directory
        run: mkdir -p downloads

      - name: Download YouTube Video
        run: |
          URL="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          # تنظیمات پیش‌فرض
          EXTRA_ARGS=""
          
          # تعیین کیفیت بر اساس انتخاب کاربر
          if [[ "$QUALITY" == *"Best"* ]]; then
            FORMAT="bestvideo+bestaudio/best"
          elif [[ "$QUALITY" == *"1080p"* ]]; then
            FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]"
          elif [[ "$QUALITY" == *"720p"* ]]; then
            FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]"
          elif [[ "$QUALITY" == *"480p"* ]]; then
            FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]"
          elif [[ "$QUALITY" == *"Audio Only"* ]]; then
            FORMAT="bestaudio/best"
            EXTRA_ARGS="-x --audio-format mp3"
          fi

          echo "Downloading $URL with format $FORMAT..."
          
          # دستور دانلود با yt-dlp
          yt-dlp -f "$FORMAT" $EXTRA_ARGS -o "downloads/%(title)s.%(ext)s" "$URL"

      - name: Upload Downloaded Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Downloaded-Media
          path: downloads/
          retention-days: 5 # فایل به مدت 5 روز در گیت‌هاب می‌ماند و سپس پاک می‌شود
