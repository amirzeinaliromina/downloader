name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیوی یوتوب را وارد کنید'
        required: true
        type: string
      quality:
        description: 'کیفیت ویدیو را انتخاب کنید'
        required: true
        type: choice
        options:
          - 'Best (بالاترین کیفیت ممکن)'
          - '1080p'
          - '720p'
          - '480p'
          - 'Audio Only (فقط صدا - MP3)'

jobs:
  download-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          # نصب آخرین نسخه توسعه‌دهنده yt-dlp برای عبور از تحریم‌های یوتوب
          pip install -U https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz

      - name: Create Downloads Directory
        run: mkdir -p downloads

      - name: Setup Cookies (If Available)
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ ! -z "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > cookies.txt
            echo "✅ فایل کوکی با موفقیت ایجاد شد."
          else
            echo "⚠️ کوکی یافت نشد. تلاش برای دور زدن ربات بدون کوکی..."
          fi

      - name: Download YouTube Video
        run: |
          URL="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          # تنظیمات ضد ربات (استفاده از کلاینت اندروید/تلویزیون به جای وب)
          EXTRA_ARGS="--extractor-args youtube:player_client=android,tv,web --rm-cache-dir"
          
          # اگر کوکی وجود داشت به دستور اضافه کن
          if [ -f "cookies.txt" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --cookies cookies.txt"
          fi
          
          if [[ "$QUALITY" == *"Best"* ]]; then
            FORMAT="bestvideo+bestaudio/best"
          elif [[ "$QUALITY" == *"1080p"* ]]; then
            FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]"
          elif [[ "$QUALITY" == *"720p"* ]]; then
            FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]"
          elif [[ "$QUALITY" == *"480p"* ]]; then
            FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]"
          elif [[ "$QUALITY" == *"Audio Only"* ]]; then
            FORMAT="bestaudio/best"
            EXTRA_ARGS="$EXTRA_ARGS -x --audio-format mp3"
          fi

          echo "Downloading $URL..."
          yt-dlp -f "$FORMAT" $EXTRA_ARGS -o "downloads/%(title)s.%(ext)s" "$URL"

      - name: Upload Downloaded Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Downloaded-Media
          path: downloads/
          retention-days: 5
